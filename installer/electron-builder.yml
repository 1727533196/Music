# ─────────────────────────────────────────────────────────────────────────────
# 音乐 — 安装器 electron-builder 配置
# 打包产物：一个独立的 DMG / NSIS 安装程序
# 安装器内置的 payload/ 目录存放主应用 .app
# ─────────────────────────────────────────────────────────────────────────────

appId: com.electron.music.installer
productName: 音乐安装程序
directories:
  buildResources: build
  output: ../dist/installer

# 打包进 asar 的文件
files:
  - out/**
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{*.md,LICENSE}'

asarUnpack:
  - resources/**

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  icon: ../build/icon.icns
  category: public.app-category.music
  entitlementsInherit: ../build/entitlements.mac.plist
  notarize: false
  # 只打包 DMG，不生成 ZIP（ZIP 压缩220MB+内容非常慢）
  target:
    - target: dmg
      arch: arm64
  extraResources:
    - from: '../dist/mac-arm64/音乐.app'
      to: 'payload/音乐.app'
      filter:
        - '**/*'
    - from: '../../NeteaseCloudMusicApi-4.28.0/bin/ncm-server'
      to: 'server/ncm-server'

dmg:
  # 安装器 DMG 名称
  artifactName: 音乐-${version}-installer.dmg
  title: 音乐 安装程序
  # 只放安装器本体，不显示 Applications 文件夹拖拽
  window:
    width: 540
    height: 380
  contents:
    - x: 270
      y: 190
      type: file
  # 背景（可选，注释掉则使用默认）
  # background: build/dmg-background.png

# ── Windows ─────────────────────────────────────────────────────────────────
win:
  icon: ../build/icon.ico
  executableName: 音乐安装程序
  extraResources:
    - from: '../dist/win-unpacked'
      to: 'payload/音乐'
      filter:
        - '**/*'
    - from: '../../NeteaseCloudMusicApi-4.28.0/bin/ncm-server.exe'
      to: 'server/ncm-server.exe'

nsis:
  artifactName: 音乐-${version}-installer-setup.exe
  shortcutName: 音乐
  uninstallDisplayName: 音乐
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always

# ── 其他 ─────────────────────────────────────────────────────────────────────
npmRebuild: false
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

